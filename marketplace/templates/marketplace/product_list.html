<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الجامعة </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .product-card { transition: transform 0.2s; border: none; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .product-card:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">متجر الجامعة </a>
        </div>
    </nav>

    <div class="container">
        <form method="GET" action="" class="mb-4 d-flex gap-2 text-end" dir="rtl">
    <input type="text" name="q" class="form-control" placeholder="ابحث عن كتب أو أدوات..." value="{{ request.GET.q }}">
    <button class="btn btn-primary" type="submit">بحث</button>
</form>
        <h2 class="mb-4">المنتجات المتاحة حالياً</h2>
        
        <div class="row">
            {% for product in products %}
            <div class="col-md-4 mb-4">
                <div class="card product-card h-100">
                    <div class="card-body">
                        <h5 class="card-title text-primary">{{ product.name }}</h5>
                        <p class="card-text text-muted">{{ product.description }}</p>
                        <h6 class="text-success">{{ product.price }} ريال</h6>
                    </div>
                    <div class="card-footer bg-white border-top-0">
                        <button class="btn btn-outline-primary w-100">شراء الآن</button>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center">
                <div class="alert alert-info">لا توجد منتجات متاحة للبيع حالياً.</div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
